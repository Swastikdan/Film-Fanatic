  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var youtubeThumbnails = document.querySelectorAll('.youtube-thumbnail');

      youtubeThumbnails.forEach(function (thumbnail) {
        thumbnail.addEventListener('click', function (event) {
          event.preventDefault();

          var videoId = event.currentTarget.href.split('?v=')[1];
          var youtubePlayer = event.currentTarget.parentNode.querySelector('.youtube-player');

          youtubePlayer.innerHTML = '<iframe class="h-96 w-full rounded-xl" src="https://www.youtube.com/embed/' + videoId + '?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
          youtubePlayer.style.display = 'block';
          event.currentTarget.style.display = 'none';
        });
      });
    });
  </script>
