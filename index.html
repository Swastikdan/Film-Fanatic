<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="">
    <header
      id="header"
      class="border-b-2 border-black dark:border-gray-200"
    ></header>
    <div class="bg-gray-200 dark:bg-gray-800 py-5 sm:py-8 lg:py-10 font-maven">
      <div class="mx-auto max-w-screen-2xl px-4 md:px-8">
        <div
          class="rounded-lg bg-gray-100 dark:bg-gray-600 px-4 py-6 md:py-8 lg:py-12"
        >
          <h2
            class="mb-4 text-center text-3xl font-bold text-gray-800 dark:text-gray-200 md:mb-6 md:text-4xl lg:text-5xl"
          >
            Experience the magic of cinema with
            <span class="text-indigo-500 dark:text-indigo-300 cursor-pointer"
              >Film Fanatic</span
            >
          </h2>

          <p
            class="mx-auto max-w-screen-md text-center text-gray-500 dark:text-gray-100 md:text-lg"
          >
            Watch trailers, sneak peeks of your favorite movies and TV shows.
          </p>
        </div>
      </div>
    </div>
    <div
      class="py-5 px-5 md:px-8 lg:px-12 flex flex-wrap justify-center bg-gray-200 dark:bg-gray-800 font-maven"
    >
      <label for="videoLink" class="sr-only">Search Movie , TV Series...</label>
      <input
      type="search" id="search-input"
        class="w-full text-black dark:text-black rounded-lg border-2 text-xl border-gray-300 px-4 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 md:w-1/2"
        placeholder="Search Movie , TV Series..."
      />
      <button
        id="search-button"
        class="mt-4 inline-block items-center rounded-md bg-blue-600 px-7 py-2 text-md md:text-xl text-white hover:bg-blue-500 space-x-3 duration-300 shadow-xl md:ml-4 md:mt-0"
      >
        Search
      </button>
    </div>

    <div
      class="flex flex-col py-3 px-4 md:px-8 space-y-10 bg-gray-200 dark:bg-gray-800"
    >
      <span
        class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-900 dark:text-gray-200 font-maven"
        >Now Playing</span
      >

      <div
        class="relative px-4 py-16 mx-auto sm:max-w-xl md:max-w-full lg:max-w-screen-xl md:px-16 lg:px-8 lg:py-20"
      >
        <div
          id="movies-container"
          class="relative grid gap-5 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 items-center"
        ></div>

        <div
          class="flex justify-center space-x-24 bg-gray-200 dark:bg-gray-800 font-maven py-5"
        >
          <button
            id="prev-button"
            class="px-4 py-2 mx-1 text-gray-500 transition-colors duration-300 transform bg-white rounded-md dark:bg-gray-600 dark:text-gray-200 hover:bg-blue-500 dark:hover:bg-blue-500 hover:text-white dark:hover:text-gray-200 shadow-lg  drop-shadow-lg"
          >
            <div class="flex items-center -mx-1">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6 mx-1 rtl:-scale-x-100"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M7 16l-4-4m0 0l4-4m-4 4h18"
                />
              </svg>

              <span class="mx-1"> previous </span>
            </div>
          </button>

          <button
            id="next-button"
            class="px-4 py-2 mx-1 text-gray-500 transition-colors duration-300 transform bg-white rounded-md dark:bg-gray-600 dark:text-gray-200 hover:bg-blue-500 dark:hover:bg-blue-500 hover:text-white dark:hover:text-gray-200 shadow-lg  drop-shadow-lg"
          >
            <div class="flex items-center -mx-1">
              <span class="mx-1"> Next </span>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6 mx-1 rtl:-scale-x-100"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 8l4 4m0 0l-4 4m4-4H3"
                />
              </svg>
            </div>
          </button>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
    <script src="./js/header.js"></script>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <script>
      var themeToggleDarkIcon = document.getElementById(
        "theme-toggle-dark-icon"
      );
      var themeToggleLightIcon = document.getElementById(
        "theme-toggle-light-icon"
      );

      // Change the icons inside the button based on previous settings
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        themeToggleLightIcon.classList.remove("hidden");
      } else {
        themeToggleDarkIcon.classList.remove("hidden");
      }

      var themeToggleBtn = document.getElementById("theme-toggle");

      themeToggleBtn.addEventListener("click", function () {
        // toggle icons inside button
        themeToggleDarkIcon.classList.toggle("hidden");
        themeToggleLightIcon.classList.toggle("hidden");

        // if set via local storage previously
        if (localStorage.getItem("color-theme")) {
          if (localStorage.getItem("color-theme") === "light") {
            document.documentElement.classList.add("dark");
            localStorage.setItem("color-theme", "dark");
          } else {
            document.documentElement.classList.remove("dark");
            localStorage.setItem("color-theme", "light");
          }

          // if NOT set via local storage previously
        } else {
          if (document.documentElement.classList.contains("dark")) {
            document.documentElement.classList.remove("dark");
            localStorage.setItem("color-theme", "light");
          } else {
            document.documentElement.classList.add("dark");
            localStorage.setItem("color-theme", "dark");
          }
        }
      });
    </script>
  </body>
</html>
