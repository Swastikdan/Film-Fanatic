                                    <div class="absolute inset-0 bg-gray-200 dark:bg-gray-800 animate-pulse"></div>
                                    <div class="absolute bottom-3 right-3">
                                        <div

                                        </div>
                                    </div>
                                </div>

                            <div class="swiper-slide">

    <script>var swiper = new Swiper(".mySwiper2", { slidesPerView: 2, spaceBetween: 30, navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }, breakpoints: { 768: { slidesPerView: 3, spaceBetween: 30 }, 1024: { slidesPerView: 4, spaceBetween: 30 }, 1536: { slidesPerView: 5, spaceBetween: 30 } } }), swiper2 = new Swiper(".mySwiper", { spaceBetween: 50, slidesPerView: 1, navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }, breakpoints: { 1024: { slidesPerView: 2, spaceBetween: 30 } } })</script>
